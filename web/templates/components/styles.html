<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', Arial, Helvetica, sans-serif;
        background-color: #0f1115; /* Darker, cooler background */
        color: #e2e8f0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
    }
    ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #475569;
    }

    /* Top Header Bar */
    .header {
        background: rgba(15, 17, 21, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        height: 55px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        z-index: 100;
        position: relative;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .logo {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .logo-text {
        color: #f8fafc;
    }

    .logo-accent {
        color: #3b82f6; /* Modern Blue */
        text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    .page-title {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        border-left: 1px solid rgba(255,255,255,0.1);
        padding-left: 20px;
    }

    .header-right {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .header-link {
        color: #94a3b8;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s, transform 0.2s;
    }

    .header-link:hover {
        color: #f8fafc;
        transform: translateY(-1px);
    }

    .header-link.active {
        color: #3b82f6;
    }

    .setup-button {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: #fff;
        padding: 8px 18px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .setup-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }

    /* Status Bar */
    .status-bar {
        background-color: rgba(15, 17, 21, 0.95);
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-size: 12px;
        color: #64748b;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .status-left {
        display: flex;
        gap: 24px;
    }

    .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #10b981;
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        animation: pulse 2s infinite;
    }

    .status-dot.warning {
        background-color: #f59e0b;
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
    }

    .status-dot.error {
        background-color: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.7; }
    }

    .status-right {
        display: flex;
        gap: 15px;
    }

    /* Main Content Area */
    .main-content {
        display: flex;
        height: calc(100vh - 143px); /* header + status + control = 55 + 28 + 60 = 143 */
    }

    /* Video Feed Area - Multi-Camera Grid */
    .video-container {
        flex: 1;
        background-color: #0f1115;
        padding: 20px;
        overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 20px;
        align-content: start;
        grid-auto-rows: minmax(200px, auto);
    }

    /* Grid layout overrides */
    .video-container[data-camera-count="1"] { grid-template-columns: 1fr; place-items: center; }
    .video-container[data-camera-count="1"] .video-feed { max-width: 90%; width: 100%; }
    .video-container[data-camera-count="2"] { grid-template-columns: repeat(2, 1fr); }
    .video-container[data-camera-count="3"], .video-container[data-camera-count="4"] { grid-template-columns: repeat(2, 1fr); }
    .video-container[data-camera-count="5"], .video-container[data-camera-count="6"], .video-container[data-camera-count="7"], .video-container[data-camera-count="8"], .video-container[data-camera-count="9"] { grid-template-columns: repeat(3, 1fr); }
    .video-container[data-camera-count="10"] { grid-template-columns: repeat(4, 1fr); }

    .video-feed {
        background: #000;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        aspect-ratio: 16/9;
        max-height: 100%;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .video-feed img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    .video-feed:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 15px rgba(59, 130, 246, 0.3);
        border-color: rgba(59, 130, 246, 0.5);
        cursor: pointer;
    }

    .placeholder-content {
        text-align: center;
        color: rgba(255,255,255,0.4);
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .optivue-watermark {
        position: absolute;
        top: 15px;
        left: 15px;
        color: rgba(255,255,255,0.3);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        z-index: 10;
        pointer-events: none;
    }

    .camera-info {
        position: absolute;
        top: 15px;
        right: 15px;
        background-color: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        color: #e2e8f0;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-family: monospace;
        z-index: 10;
        pointer-events: none;
    }

    .camera-label {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background-color: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        color: #f8fafc;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        border-left: 3px solid #3b82f6;
        z-index: 10;
        pointer-events: none;
    }

    /* Control Bar at Bottom */
    .control-bar {
        background: rgba(15, 17, 21, 0.8);
        backdrop-filter: blur(12px);
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border-top: 1px solid rgba(255,255,255,0.05);
        z-index: 100;
        position: relative;
    }

    .control-button {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 12px;
        color: #e2e8f0;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-width: 75px;
        transition: all 0.2s;
    }

    .control-button:hover {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.2);
        transform: translateY(-2px);
    }

    .control-button:active {
        transform: translateY(0);
        background: rgba(255,255,255,0.02);
    }

    .button-icon {
        font-size: 20px;
    }

    .button-label {
        font-size: 11px;
        font-weight: 600;
    }

    /* Modal / Lightbox Styles */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .modal-overlay.active {
        opacity: 1;
        visibility: visible;
    }

    .modal-content {
        position: relative;
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        transform: scale(0.95);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: #000;
    }

    .modal-overlay.active .modal-content {
        transform: scale(1);
    }

    .modal-content img, .modal-content video {
        max-width: 100%;
        max-height: 90vh;
        display: block;
        object-fit: contain;
    }

    .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 36px;
        height: 36px;
        background: rgba(0,0,0,0.5);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: background 0.2s;
    }

    .modal-close:hover {
        background: rgba(239, 68, 68, 0.8);
    }

    .modal-actions {
        position: absolute;
        bottom: 15px;
        right: 15px;
        display: flex;
        gap: 10px;
        z-index: 10;
    }

    .modal-btn {
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 8px 16px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
    }

    .modal-btn:hover {
        background: rgba(59, 130, 246, 0.8);
        border-color: rgba(59, 130, 246, 1);
    }

    .modal-title {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        color: white;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 600;
        z-index: 10;
    }

    /* Responsive */
    @media (max-width: 1200px) {
        .video-container { grid-template-columns: repeat(2, 1fr) !important; }
        .video-container[data-camera-count="1"] { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 768px) {
        .header { padding: 0 15px; }
        .page-title { display: none; }
        .status-left { gap: 10px; }
        .status-right { display: none; }
        
        .video-container {
            grid-template-columns: 1fr !important;
            padding: 10px;
            gap: 15px;
        }

        .control-bar {
            padding: 0 10px;
            height: 60px;
            overflow-x: auto;
            justify-content: flex-start;
            gap: 10px;
        }

        .control-button {
            min-width: 65px;
            padding: 6px 10px;
        }
    }
</style>
